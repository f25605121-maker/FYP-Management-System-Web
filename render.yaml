services:
  - type: web
    name: fyp-management-system
    runtime: python
    buildCommand: pip install -r requirements.txt && python build.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: RENDER
        value: "1"
    disk:
      name: fyp-data
      mountPath: /opt/render/project/data
      sizeGB: 1
